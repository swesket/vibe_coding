<script>
  function renderComments() {
    const t = i18n[currentLang];
    document.getElementById('commentsTitle').textContent = t.comments.title;
    document.getElementById('commentsDesc').textContent = t.comments.desc;
    const block = document.getElementById('guidelinesBlock');
    if (t.comments.guidelines) {
      block.innerHTML = `<h3>${t.comments.guidelinesTitle}</h3><ul>${t.comments.guidelines.map(g => `<li>${g}</li>`).join('')}</ul>`;
    }
  }

  document.addEventListener('langchange', renderComments);
