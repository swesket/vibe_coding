<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIGGING — Fashion Site Curation</title>
  <meta name="description" content="Curated fashion shopping sites from around the world. Original shopping guides, expert tips, and hand-picked destinations for street, luxury, vintage, and sneakers." />
  <meta name="google-adsense-account" content="ca-pub-4004698288665198">
  <link rel="canonical" href="https://swesket.github.io/vibe_coding/" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4004698288665198" crossorigin="anonymous"></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "DIGGING",
    "url": "https://swesket.github.io/vibe_coding/",
    "description": "Curated fashion shopping site directory with original buying guides",
    "publisher": {
      "@type": "Organization",
      "name": "DIGGING"
    }
  }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d; --surface: #161616; --card: #1e1e1e; --border: #2a2a2a;
      --accent: #c8a96e; --accent-soft: rgba(200, 169, 110, 0.12);
      --text: #f0f0f0; --muted: #888; --tag-bg: #252525;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
    html { scroll-behavior: smooth; }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border); padding: 0 2rem;
      position: sticky; top: 0; background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px); z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; gap: 1rem;
    }
    .logo {
      font-family: 'Playfair Display', serif; font-size: 1.5rem;
      letter-spacing: 0.15em; color: var(--accent); flex-shrink: 0; cursor: pointer;
    }
    .logo span {
      color: var(--text); font-size: 0.65rem; font-family: 'Inter', sans-serif;
      font-weight: 300; letter-spacing: 0.3em; display: block;
      text-transform: uppercase; margin-top: -4px;
    }

    nav {
      display: flex; align-items: center; gap: 1.5rem;
    }
    nav a {
      color: var(--muted); text-decoration: none; font-size: 0.78rem;
      font-weight: 500; letter-spacing: 0.04em; transition: color 0.2s;
      white-space: nowrap;
    }
    nav a:hover { color: var(--text); }

    .header-right { display: flex; align-items: center; gap: 0.75rem; }
    .search-box {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.45rem 1rem; width: 200px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box svg { color: var(--muted); flex-shrink: 0; }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 0.875rem; width: 100%;
    }
    .search-box input::placeholder { color: var(--muted); }

    /* ── LANG SELECTOR ── */
    .lang-selector { position: relative; flex-shrink: 0; }
    .lang-btn {
      display: flex; align-items: center; gap: 0.4rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.45rem 0.8rem;
      color: var(--text); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: border-color 0.2s; white-space: nowrap;
    }
    .lang-btn:hover { border-color: var(--accent); }
    .lang-btn svg { width: 12px; height: 12px; color: var(--muted); transition: transform 0.2s; }
    .lang-selector.open .lang-btn svg { transform: rotate(180deg); }
    .lang-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; min-width: 140px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5); z-index: 200;
    }
    .lang-selector.open .lang-dropdown { display: block; }
    .lang-option {
      display: block; width: 100%; padding: 0.6rem 1rem; background: none;
      border: none; color: var(--muted); font-size: 0.82rem;
      text-align: left; cursor: pointer; transition: all 0.15s;
    }
    .lang-option:hover { background: var(--accent-soft); color: var(--text); }
    .lang-option.active { color: var(--accent); font-weight: 600; }

    /* ── HERO ── */
    .hero { text-align: center; padding: 5rem 2rem 3.5rem; border-bottom: 1px solid var(--border); }
    .hero-eyebrow {
      font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 1.2rem;
    }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 5vw, 4rem); line-height: 1.15; margin-bottom: 1rem; }
    .hero p { color: var(--muted); font-size: 1rem; font-weight: 300; max-width: 480px; margin: 0 auto; line-height: 1.7; }
    .hero-stats {
      display: flex; justify-content: center; gap: 3rem; margin-top: 2rem;
    }
    .hero-stat { text-align: center; }
    .hero-stat .num { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
    .hero-stat .label { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; letter-spacing: 0.05em; }

    /* ── FILTER ── */
    .filter-bar {
      display: flex; gap: 0.5rem; padding: 1.8rem 2rem;
      overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border);
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 0.45rem 1.1rem; border-radius: 999px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .tab:hover { color: var(--text); border-color: #444; }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #0d0d0d; }

    /* ── GRID ── */
    .main { padding: 2.5rem 2rem 3rem; max-width: 1400px; margin: 0 auto; }
    .section-label {
      font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 1.4rem;
    }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem; margin-bottom: 2rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 1.4rem 1.4rem 1.2rem; text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 0.85rem;
      transition: all 0.25s ease; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent-soft), transparent 60%);
      opacity: 0; transition: opacity 0.3s; z-index: 0;
    }
    .card-head, .card-desc, .card-footer { position: relative; z-index: 1; }
    .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
    .card:hover::before { opacity: 1; }
    .card-head { display: flex; align-items: center; gap: 0.9rem; }
    .favicon {
      width: 40px; height: 40px; border-radius: 10px; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0; border: 1px solid var(--border);
    }
    .card-title { font-size: 0.97rem; font-weight: 600; line-height: 1.3; }
    .card-url { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.65; font-weight: 300; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .tag {
      font-size: 0.68rem; padding: 0.25rem 0.6rem; border-radius: 999px;
      background: var(--tag-bg); color: var(--muted); font-weight: 500;
    }
    .arrow { color: var(--accent); font-size: 0.85rem; opacity: 0; transform: translateX(-4px); transition: all 0.2s; }
    .card:hover .arrow { opacity: 1; transform: translateX(0); }
    .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); display: none; }
    .empty.show { display: block; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .card { animation: fadeInUp 0.35s ease both; }

    /* ── GUIDE SECTION ── */
    .guide-section {
      border-top: 1px solid var(--border); padding: 4rem 2rem;
      max-width: 1000px; margin: 0 auto;
    }
    .guide-section h2 {
      font-family: 'Playfair Display', serif; font-size: 1.8rem;
      text-align: center; margin-bottom: 0.6rem;
    }
    .guide-section > .sub {
      text-align: center; color: var(--muted); font-size: 0.9rem;
      font-weight: 300; margin-bottom: 3rem; line-height: 1.6;
    }
    .guide-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .guide-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 1.8rem; transition: border-color 0.2s;
    }
    .guide-card:hover { border-color: #444; }
    .guide-card h3 {
      font-size: 1rem; font-weight: 600; margin-bottom: 0.8rem;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .guide-card h3 .icon { font-size: 1.3rem; }
    .guide-card p {
      color: var(--muted); font-size: 0.84rem; line-height: 1.75; font-weight: 300;
    }
    .guide-card .tip {
      margin-top: 1rem; padding: 0.8rem 1rem; background: var(--accent-soft);
      border-radius: 8px; font-size: 0.78rem; color: var(--accent);
      font-weight: 500; line-height: 1.5;
    }

    /* ── ABOUT ── */
    .about-section {
      border-top: 1px solid var(--border); padding: 4rem 2rem;
      max-width: 720px; margin: 0 auto;
    }
    .about-section h2 {
      font-family: 'Playfair Display', serif; font-size: 1.6rem;
      text-align: center; margin-bottom: 0.6rem;
    }
    .about-section > .sub {
      text-align: center; color: var(--muted); font-size: 0.88rem;
      font-weight: 300; line-height: 1.7; margin-bottom: 2rem;
    }
    .about-values {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem;
    }
    .about-value {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.4rem; text-align: center;
    }
    .about-value .icon { font-size: 1.5rem; margin-bottom: 0.6rem; }
    .about-value h4 { font-size: 0.88rem; margin-bottom: 0.4rem; }
    .about-value p { font-size: 0.78rem; color: var(--muted); font-weight: 300; line-height: 1.5; }

    /* ── ADS ── */
    .ad-slot { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; text-align: center; }
    .ad-slot ins { display: block; }

    /* ── SUBMIT FORM ── */
    .submit-section { border-top: 1px solid var(--border); padding: 4rem 2rem; max-width: 640px; margin: 0 auto; }
    .submit-section h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 0.5rem; }
    .submit-section .sub { color: var(--muted); font-size: 0.85rem; font-weight: 300; line-height: 1.6; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.04em; }
    .form-group label .req { color: var(--accent); margin-left: 2px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.7rem 1rem; color: var(--text);
      font-size: 0.88rem; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group input::placeholder, .form-group textarea::placeholder { color: #555; }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .form-group select {
      cursor: pointer; appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5l3 3 3-3' stroke='%23888' stroke-width='1.5'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 1rem center; padding-right: 2.5rem;
    }
    .form-group select option { background: var(--card); color: var(--text); }
    .submit-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      margin-top: 0.5rem; padding: 0.75rem 2rem; background: var(--accent);
      color: #0d0d0d; border: none; border-radius: 10px;
      font-size: 0.88rem; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .submit-btn:hover { background: #d4b878; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200, 169, 110, 0.25); }
    .form-success { display: none; text-align: center; padding: 2.5rem 1rem; }
    .form-success.show { display: block; }
    .form-success .check { font-size: 2.5rem; margin-bottom: 1rem; }
    .form-success h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .form-success p { color: var(--muted); font-size: 0.85rem; }

    /* ── DISQUS ── */
    .comments-section { border-top: 1px solid var(--border); padding: 4rem 2rem; max-width: 800px; margin: 0 auto; }
    .comments-section h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 0.5rem; }
    .comments-section .sub { color: var(--muted); font-size: 0.85rem; font-weight: 300; line-height: 1.6; margin-bottom: 2rem; }
    #disqus_thread { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border); padding: 2.5rem 2rem;
      max-width: 1000px; margin: 0 auto;
    }
    .footer-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .footer-brand .f-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); letter-spacing: 0.1em; }
    .footer-brand p { color: var(--muted); font-size: 0.78rem; font-weight: 300; margin-top: 0.4rem; line-height: 1.5; max-width: 280px; }
    .footer-links { display: flex; gap: 2.5rem; }
    .footer-col h4 { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.7rem; }
    .footer-col a { display: block; color: var(--text); text-decoration: none; font-size: 0.82rem; font-weight: 300; margin-bottom: 0.4rem; transition: color 0.2s; }
    .footer-col a:hover { color: var(--accent); }
    .footer-bottom { border-top: 1px solid var(--border); padding-top: 1.5rem; text-align: center; font-size: 0.75rem; color: var(--muted); }

    @media (max-width: 768px) {
      nav { display: none; }
      .search-box { width: 100%; }
      header { flex-wrap: wrap; height: auto; padding: 1rem; gap: 0.8rem; }
      .header-right { width: 100%; }
      .search-box { flex: 1; }
      .hero { padding: 3rem 1.2rem 2.5rem; }
      .hero-stats { gap: 1.5rem; }
      .main { padding: 2rem 1.2rem 3rem; }
      .guide-section, .about-section, .submit-section, .comments-section { padding: 3rem 1.2rem; }
      .footer-top { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="window.scrollTo({top:0})">
    DIGGING
    <span>Fashion Site Curation</span>
  </div>
  <nav id="nav"></nav>
  <div class="header-right">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="" />
    </div>
    <div class="lang-selector" id="langSelector">
      <button class="lang-btn" id="langBtn">
        <span id="langLabel">KO</span>
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4.5l3 3 3-3"/></svg>
      </button>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-option active" data-lang="ko">Korean</button>
        <button class="lang-option" data-lang="en">English</button>
        <button class="lang-option" data-lang="zh">Chinese</button>
        <button class="lang-option" data-lang="ja">Japanese</button>
      </div>
    </div>
  </div>
</header>

<section class="hero" id="top">
  <p class="hero-eyebrow" id="heroEyebrow"></p>
  <h1 id="heroTitle"></h1>
  <p id="heroDesc"></p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="num">29</div><div class="label" id="statSites"></div></div>
    <div class="hero-stat"><div class="num">6</div><div class="label" id="statCats"></div></div>
    <div class="hero-stat"><div class="num">4</div><div class="label" id="statLangs"></div></div>
  </div>
</section>

<div class="filter-bar" id="filterBar"></div>

<main class="main" id="sites">
  <p class="section-label" id="sectionLabel"></p>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty"></div>
</main>

<div class="ad-slot">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4004698288665198" data-ad-slot="auto" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<section class="guide-section" id="guide">
  <h2 id="guideTitle"></h2>
  <p class="sub" id="guideDesc"></p>
  <div class="guide-grid" id="guideGrid"></div>
</section>

<div class="ad-slot">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4004698288665198" data-ad-slot="auto" data-ad-format="rectangle" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<section class="about-section" id="about">
  <h2 id="aboutTitle"></h2>
  <p class="sub" id="aboutDesc"></p>
  <div class="about-values" id="aboutValues"></div>
</section>

<section class="submit-section" id="submit">
  <h2 id="formTitle"></h2>
  <p class="sub" id="formDesc"></p>
  <form id="submitForm" action="https://formspree.io/f/xreayzej" method="POST">
    <div class="form-group"><label id="labelSiteName"></label><input type="text" name="site_name" required id="inputSiteName" /></div>
    <div class="form-group"><label id="labelSiteUrl"></label><input type="url" name="site_url" required id="inputSiteUrl" placeholder="https://" /></div>
    <div class="form-group"><label id="labelCategory"></label><select name="category" required id="selectCategory"></select></div>
    <div class="form-group"><label id="labelDesc"></label><textarea name="description" id="inputDesc"></textarea></div>
    <div class="form-group"><label id="labelContact"></label><input type="email" name="email" required id="inputContact" /></div>
    <button type="submit" class="submit-btn" id="submitBtn"></button>
  </form>
  <div class="form-success" id="formSuccess">
    <div class="check">&#10003;</div>
    <h3 id="successTitle"></h3>
    <p id="successDesc"></p>
  </div>
</section>

<section class="comments-section" id="community">
  <h2 id="commentsTitle"></h2>
  <p class="sub" id="commentsDesc"></p>
  <div id="disqus_thread"></div>
  <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</section>

<footer>
  <div class="footer-top">
    <div class="footer-brand">
      <div class="f-logo">DIGGING</div>
      <p id="footerBrandDesc"></p>
    </div>
    <div class="footer-links">
      <div class="footer-col">
        <h4 id="footerNavTitle"></h4>
        <a href="#sites" id="footerNavSites"></a>
        <a href="#guide" id="footerNavGuide"></a>
        <a href="#about" id="footerNavAbout"></a>
      </div>
      <div class="footer-col">
        <h4 id="footerLegalTitle"></h4>
        <a href="privacy.html" id="footerPrivacy"></a>
        <a href="#submit" id="footerNavSubmit"></a>
        <a href="mailto:swesket@gmail.com" id="footerContact"></a>
      </div>
    </div>
  </div>
  <div class="footer-bottom" id="footerCopy"></div>
</footer>

<script>
  // ── i18n ──
  const i18n = {
    ko: {
      searchPlaceholder: "사이트 검색...",
      heroEyebrow: "Curated Fashion Destinations",
      heroTitle: "당신의 다음<br/>스타일을 발견하세요",
      heroDesc: "국내외 패션 쇼핑 사이트를 한 곳에서 큐레이션합니다. 카테고리별 쇼핑 가이드와 함께 브랜드, 빈티지, 스트릿까지 탐색하세요.",
      stats: { sites: "큐레이션 사이트", cats: "카테고리", langs: "지원 언어" },
      empty: "검색 결과가 없습니다.",

    { name: "Sneakersnstuff", url: "sneakersnstuff.com", href: "https://www.sneakersnstuff.com", emoji: "🧦", cat: "sneaker", desc: { ko: "스웨덴 발 스니커즈 전문 셀렉트샵. 유럽 한정 콜라보 강점.", en: "Swedish sneaker specialist. Strong European exclusive collabs.", zh: "瑞典球鞋专业精选店。", ja: "スウェーデン発スニーカー専門セレクトショップ。" }, tags: { ko: ["스니커즈","유럽","콜라보"], en: ["Sneakers","Europe","Collabs"], zh: ["球鞋","欧洲","联名"], ja: ["スニーカー","ヨーロッパ","コラボ"] } },
    { name: "ASOS", url: "asos.com", href: "https://www.asos.com", emoji: "🌍", cat: "global", desc: { ko: "영국 기반 글로벌 패션 멀티샵. 방대한 브랜드와 자체 라인 보유.", en: "UK-based global fashion multi-shop. Massive brand range plus own label.", zh: "英国全球时尚综合店。拥有海量品牌和自有线。", ja: "英国発グローバルファッションマルチショップ。" }, tags: { ko: ["글로벌","트렌디","가성비"], en: ["Global","Trendy","Value"], zh: ["全球","潮流","性价比"], ja: ["グローバル","トレンド","コスパ"] } },
    { name: "Zara", url: "zara.com", href: "https://www.zara.com", emoji: "🇪🇸", cat: "global", desc: { ko: "SPA 패스트패션의 아이콘. 트렌드 빠른 회전율.", en: "The icon of fast fashion. Rapid trend turnover.", zh: "快时尚的标杆。趋势快速更迭。", ja: "ファストファッションのアイコン。トレンドの高速回転。" }, tags: { ko: ["SPA","트렌드","글로벌"], en: ["SPA","Trend","Global"], zh: ["SPA","趋势","全球"], ja: ["SPA","トレンド","グローバル"] } },
    { name: "Uniqlo", url: "uniqlo.com", href: "https://www.uniqlo.com", emoji: "🎌", cat: "global", desc: { ko: "일본 라이프웨어 SPA. LifeWear 철학. 소재 퀄리티 강점.", en: "Japanese LifeWear SPA. Material quality as core strength.", zh: "日本LifeWear SPA。面料品质为核心优势。", ja: "日本のLifeWear SPA。素材クオリティが強み。" }, tags: { ko: ["베이직","소재","일본SPA"], en: ["Basics","Fabric","Japan SPA"], zh: ["基础款","面料","日本SPA"], ja: ["ベーシック","素材","日本SPA"] } },
    { name: "End Clothing", url: "endclothing.com", href: "https://www.endclothing.com", emoji: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", cat: "global", desc: { ko: "영국 뉴캐슬 발 럭셔리·스트릿 셀렉트샵.", en: "Newcastle-based luxury & street select shop.", zh: "英国纽卡斯尔奢侈·街头精选店。", ja: "英国ニューカッスル発ラグジュアリー・ストリートセレクト。" }, tags: { ko: ["셀렉트","드롭","UK"], en: ["Select","Drop","UK"], zh: ["精选","限量","英国"], ja: ["セレクト","ドロップ","UK"] } },
  ];

  // ── DOM ──
  const grid = document.getElementById('grid');
  const emptyEl = document.getElementById('empty');
  const searchInput = document.getElementById('searchInput');
  const sectionLabel = document.getElementById('sectionLabel');
  const filterBar = document.getElementById('filterBar');
  const langSelector = document.getElementById('langSelector');
  const langBtn = document.getElementById('langBtn');
  const langLabel = document.getElementById('langLabel');
  const langDropdown = document.getElementById('langDropdown');
  const submitForm = document.getElementById('submitForm');
  const formSuccess = document.getElementById('formSuccess');

  let currentFilter = 'all', currentSearch = '', currentLang = 'ko';
  const langNames = { ko: 'KO', en: 'EN', zh: 'ZH', ja: 'JA' };
  const catKeys = ['all','korea','luxury','street','vintage','sneaker','global'];

  // lang dropdown
  langBtn.addEventListener('click', (e) => { e.stopPropagation(); langSelector.classList.toggle('open'); });
  document.addEventListener('click', () => langSelector.classList.remove('open'));
  langDropdown.addEventListener('click', (e) => {
    const opt = e.target.closest('.lang-option'); if (!opt) return;
    currentLang = opt.dataset.lang;
    langLabel.textContent = langNames[currentLang];
    langDropdown.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active'); langSelector.classList.remove('open');
    document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : currentLang;
    applyLang(); render();
  });

  function applyLang() {
    const t = i18n[currentLang];
    searchInput.placeholder = t.searchPlaceholder;
    document.getElementById('heroEyebrow').textContent = t.heroEyebrow;
    document.getElementById('heroTitle').innerHTML = t.heroTitle;
    document.getElementById('heroDesc').textContent = t.heroDesc;
    document.getElementById('statSites').textContent = t.stats.sites;
    document.getElementById('statCats').textContent = t.stats.cats;
    document.getElementById('statLangs').textContent = t.stats.langs;
    emptyEl.textContent = t.empty;

    // nav
    const nav = document.getElementById('nav');
    nav.innerHTML = `<a href="#sites">${t.nav.sites}</a><a href="#guide">${t.nav.guide}</a><a href="#about">${t.nav.about}</a><a href="#submit">${t.nav.submit}</a>`;

    // guide
    document.getElementById('guideTitle').textContent = t.guide.title;
    document.getElementById('guideDesc').textContent = t.guide.desc;
    const gg = document.getElementById('guideGrid');
    gg.innerHTML = '';
    t.guide.items.forEach(item => {
      const d = document.createElement('div'); d.className = 'guide-card';
      d.innerHTML = `<h3><span class="icon">${item.icon}</span>${item.title}</h3><p>${item.body}</p><div class="tip">${item.tip}</div>`;
      gg.appendChild(d);
    });

    // about
    document.getElementById('aboutTitle').textContent = t.about.title;
    document.getElementById('aboutDesc').textContent = t.about.desc;
    const av = document.getElementById('aboutValues');
    av.innerHTML = '';
    t.about.values.forEach(v => {
      const d = document.createElement('div'); d.className = 'about-value';
      d.innerHTML = `<div class="icon">${v.icon}</div><h4>${v.title}</h4><p>${v.desc}</p>`;
      av.appendChild(d);
    });

    // form
    const f = t.form;
    document.getElementById('formTitle').textContent = f.title;
    document.getElementById('formDesc').textContent = f.desc;
    document.getElementById('labelSiteName').innerHTML = f.siteName + ' <span class="req">*</span>';
    document.getElementById('labelSiteUrl').innerHTML = f.siteUrl + ' <span class="req">*</span>';
    document.getElementById('labelCategory').innerHTML = f.category + ' <span class="req">*</span>';
    document.getElementById('labelDesc').textContent = f.description;
    document.getElementById('labelContact').innerHTML = f.contact + ' <span class="req">*</span>';
    document.getElementById('inputSiteName').placeholder = f.siteName;
    document.getElementById('inputDesc').placeholder = f.descPlaceholder;
    document.getElementById('inputContact').placeholder = f.contactPlaceholder;
    document.getElementById('submitBtn').textContent = f.submit;
    document.getElementById('successTitle').textContent = f.successTitle;
    document.getElementById('successDesc').textContent = f.successDesc;
    const sel = document.getElementById('selectCategory');
    sel.innerHTML = `<option value="" disabled selected>${f.categoryPlaceholder}</option>`;
    ['korea','luxury','street','vintage','sneaker','global'].forEach(key => {
      const o = document.createElement('option'); o.value = key; o.textContent = t.categories[key]; sel.appendChild(o);
    });

    // comments
    document.getElementById('commentsTitle').textContent = t.comments.title;
    document.getElementById('commentsDesc').textContent = t.comments.desc;

    // footer
    const ft = t.footer;
    document.getElementById('footerBrandDesc').textContent = ft.brandDesc;
    document.getElementById('footerNavTitle').textContent = ft.navTitle;
    document.getElementById('footerLegalTitle').textContent = ft.legalTitle;
    document.getElementById('footerNavSites').textContent = ft.sites;
    document.getElementById('footerNavGuide').textContent = ft.guide;
    document.getElementById('footerNavAbout').textContent = ft.about;
    document.getElementById('footerPrivacy').textContent = ft.privacy;
    document.getElementById('footerNavSubmit').textContent = ft.submit;
    document.getElementById('footerContact').textContent = ft.contact;
    document.getElementById('footerCopy').textContent = ft.copy;

    // filter tabs
    filterBar.innerHTML = '';
    catKeys.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (key === currentFilter ? ' active' : '');
      btn.dataset.filter = key; btn.textContent = t.categories[key];
      btn.addEventListener('click', () => {
        filterBar.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); currentFilter = key; render();
      });
      filterBar.appendChild(btn);
    });
  }

  function render() {
    const t = i18n[currentLang]; const q = currentSearch.toLowerCase();
    const filtered = sites.filter(s => {
      const matchCat = currentFilter === 'all' || s.cat === currentFilter;
      const desc = s.desc[currentLang] || s.desc.ko;
      const tags = s.tags[currentLang] || s.tags.ko;
      const matchQ = !q || s.name.toLowerCase().includes(q) || desc.toLowerCase().includes(q) || tags.some(tag => tag.toLowerCase().includes(q));
      return matchCat && matchQ;
    });
    grid.innerHTML = '';
    sectionLabel.textContent = `${t.categories[currentFilter]} — ${filtered.length}${t.countSuffix}`;
    if (filtered.length === 0) { emptyEl.classList.add('show'); } else {
      emptyEl.classList.remove('show');
      filtered.forEach((s, i) => {
        const desc = s.desc[currentLang] || s.desc.ko;
        const tags = s.tags[currentLang] || s.tags.ko;
        const a = document.createElement('a');
        a.className = 'card'; a.href = s.href; a.target = '_blank'; a.rel = 'noopener noreferrer';
        a.innerHTML = `<div class="card-head"><div class="favicon">${s.emoji}</div><div><div class="card-title">${s.name}</div><div class="card-url">${s.url}</div></div></div><p class="card-desc">${desc}</p><div class="card-footer"><div class="tags">${tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div><span class="arrow">→</span></div>`;
        a.style.animationDelay = `${i * 0.04}s`; grid.appendChild(a);
      });
    }
  }

  searchInput.addEventListener('input', e => { currentSearch = e.target.value; render(); });

  submitForm.addEventListener('submit', async (e) => {
    e.preventDefault(); const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.style.opacity = '0.6';
    try {
      const res = await fetch(submitForm.action, { method: 'POST', body: new FormData(submitForm), headers: { 'Accept': 'application/json' } });
      if (res.ok) { submitForm.style.display = 'none'; formSuccess.classList.add('show'); submitForm.reset(); }
    } finally { btn.disabled = false; btn.style.opacity = '1'; }
  });

  applyLang(); render();

  // Disqus
  var disqus_config = function () { this.page.url = 'https://swesket.github.io/vibe_coding/'; this.page.identifier = 'digging-main'; };
  (function() { var d = document, s = d.createElement('script'); s.src = 'https://digging-1.disqus.com/embed.js'; s.setAttribute('data-timestamp', +new Date()); (d.head || d.body).appendChild(s); })();
</script>
