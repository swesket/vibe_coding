<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIGGING — Fashion Site Curation</title>
  <meta name="description" content="Curated fashion shopping sites from around the world. Street, luxury, vintage, sneakers and more." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --accent-soft: rgba(200, 169, 110, 0.12);
      --text: #f0f0f0;
      --muted: #888;
      --tag-bg: #252525;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 1rem;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      flex-shrink: 0;
    }

    .logo span {
      color: var(--text);
      font-size: 0.65rem;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: 0.3em;
      display: block;
      text-transform: uppercase;
      margin-top: -4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 1rem;
      width: 240px;
      transition: border-color 0.2s;
    }

    .search-box:focus-within { border-color: var(--accent); }
    .search-box svg { color: var(--muted); flex-shrink: 0; }

    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.875rem;
      width: 100%;
    }

    .search-box input::placeholder { color: var(--muted); }

    /* ── LANG SELECTOR ── */
    .lang-selector {
      position: relative;
      flex-shrink: 0;
    }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.8rem;
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s;
      white-space: nowrap;
    }

    .lang-btn:hover { border-color: var(--accent); }

    .lang-btn svg {
      width: 12px;
      height: 12px;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .lang-selector.open .lang-btn svg { transform: rotate(180deg); }

    .lang-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      min-width: 140px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      z-index: 200;
    }

    .lang-selector.open .lang-dropdown { display: block; }

    .lang-option {
      display: block;
      width: 100%;
      padding: 0.6rem 1rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.82rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lang-option:hover {
      background: var(--accent-soft);
      color: var(--text);
    }

    .lang-option.active {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 5rem 2rem 3.5rem;
      border-bottom: 1px solid var(--border);
    }

    .hero-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    .hero p {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── FILTER TABS ── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      padding: 1.8rem 2rem;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }

    .filter-bar::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab:hover { color: var(--text); border-color: #444; }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0d;
    }

    /* ── GRID ── */
    .main { padding: 2.5rem 2rem 5rem; max-width: 1400px; margin: 0 auto; }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.4rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
      margin-bottom: 3.5rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.4rem 1.2rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-soft), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 0;
    }

    .card-head, .card-desc, .card-footer {
      position: relative;
      z-index: 1;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }

    .card:hover::before { opacity: 1; }

    .card-head {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .favicon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .card-title { font-size: 0.97rem; font-weight: 600; line-height: 1.3; }
    .card-url { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.65;
      font-weight: 300;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .tag {
      font-size: 0.68rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--muted);
      font-weight: 500;
    }

    .arrow {
      color: var(--accent);
      font-size: 0.85rem;
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.2s;
    }

    .card:hover .arrow { opacity: 1; transform: translateX(0); }

    /* ── NO RESULT ── */
    .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); display: none; }
    .empty.show { display: block; }

    /* ── CARD ANIMATION ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeInUp 0.35s ease both; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── SUBMIT FORM ── */
    .submit-section {
      border-top: 1px solid var(--border);
      padding: 4rem 2rem;
      max-width: 640px;
      margin: 0 auto;
    }

    .submit-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }

    .submit-section .sub {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
    }

    .form-group label .req {
      color: var(--accent);
      margin-left: 2px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #555;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-group select {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5l3 3 3-3' stroke='%23888' stroke-width='1.5'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      padding-right: 2.5rem;
    }

    .form-group select option {
      background: var(--card);
      color: var(--text);
    }

    .submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .submit-btn:hover {
      background: #d4b878;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200, 169, 110, 0.25);
    }

    .form-success {
      display: none;
      text-align: center;
      padding: 2.5rem 1rem;
    }

    .form-success.show { display: block; }

    .form-success .check {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .form-success h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .form-success p {
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* ── DISQUS COMMENTS ── */
    .comments-section {
      border-top: 1px solid var(--border);
      padding: 4rem 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .comments-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }

    .comments-section .sub {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    #disqus_thread {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
    }

    @media (max-width: 640px) {
      .search-box { width: 100%; }
      header { flex-wrap: wrap; height: auto; padding: 1rem; gap: 0.8rem; }
      .header-right { width: 100%; }
      .search-box { flex: 1; }
      .hero { padding: 3rem 1.2rem 2.5rem; }
      .main { padding: 2rem 1.2rem 4rem; }
      .submit-section { padding: 3rem 1.2rem; }
      .comments-section { padding: 3rem 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    DIGGING
    <span>Fashion Site Curation</span>
  </div>
  <div class="header-right">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="" />
    </div>
    <div class="lang-selector" id="langSelector">
      <button class="lang-btn" id="langBtn">
        <span id="langLabel">KO</span>
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4.5l3 3 3-3"/></svg>
      </button>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-option active" data-lang="ko">Korean</button>
        <button class="lang-option" data-lang="en">English</button>
        <button class="lang-option" data-lang="zh">Chinese</button>
        <button class="lang-option" data-lang="ja">Japanese</button>
      </div>
    </div>
  </div>
</header>

<section class="hero">
  <p class="hero-eyebrow" id="heroEyebrow"></p>
  <h1 id="heroTitle"></h1>
  <p id="heroDesc"></p>
</section>

<div class="filter-bar" id="filterBar"></div>

<main class="main">
  <p class="section-label" id="sectionLabel"></p>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty"></div>
</main>

<section class="submit-section" id="submitSection">
  <h2 id="formTitle"></h2>
  <p class="sub" id="formDesc"></p>

  <form id="submitForm" action="https://formspree.io/f/xreayzej" method="POST">
    <div class="form-group">
      <label id="labelSiteName"><span class="req">*</span></label>
      <input type="text" name="site_name" required id="inputSiteName" />
    </div>
    <div class="form-group">
      <label id="labelSiteUrl"><span class="req">*</span></label>
      <input type="url" name="site_url" required id="inputSiteUrl" placeholder="https://" />
    </div>
    <div class="form-group">
      <label id="labelCategory"><span class="req">*</span></label>
      <select name="category" required id="selectCategory"></select>
    </div>
    <div class="form-group">
      <label id="labelDesc"></label>
      <textarea name="description" id="inputDesc"></textarea>
    </div>
    <div class="form-group">
      <label id="labelContact"><span class="req">*</span></label>
      <input type="email" name="email" required id="inputContact" />
    </div>
    <button type="submit" class="submit-btn" id="submitBtn"></button>
  </form>

  <div class="form-success" id="formSuccess">
    <div class="check">&#10003;</div>
    <h3 id="successTitle"></h3>
    <p id="successDesc"></p>
  </div>
</section>

<section class="comments-section">
  <h2 id="commentsTitle"></h2>
  <p class="sub" id="commentsDesc"></p>
  <div id="disqus_thread"></div>
  <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</section>

<footer id="footer"></footer>

  // ── DOM ──
  const grid = document.getElementById('grid');
  const emptyEl = document.getElementById('empty');
  const searchInput = document.getElementById('searchInput');
  const sectionLabel = document.getElementById('sectionLabel');
  const filterBar = document.getElementById('filterBar');
  const heroEyebrow = document.getElementById('heroEyebrow');
  const heroTitle = document.getElementById('heroTitle');
  const heroDesc = document.getElementById('heroDesc');
  const footer = document.getElementById('footer');
  const langSelector = document.getElementById('langSelector');
  const langBtn = document.getElementById('langBtn');
  const langLabel = document.getElementById('langLabel');
  const langDropdown = document.getElementById('langDropdown');

  // form DOM
  const submitForm = document.getElementById('submitForm');
  const formSuccess = document.getElementById('formSuccess');

  let currentFilter = 'all';
  let currentSearch = '';
  let currentLang = 'ko';

  const langNames = { ko: 'KO', en: 'EN', zh: 'ZH', ja: 'JA' };
  const catKeys = ['all', 'korea', 'luxury', 'street', 'vintage', 'sneaker', 'global'];

  // ── LANG DROPDOWN ──
  langBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    langSelector.classList.toggle('open');
  });

  document.addEventListener('click', () => langSelector.classList.remove('open'));

  langDropdown.addEventListener('click', (e) => {
    const opt = e.target.closest('.lang-option');
    if (!opt) return;
    currentLang = opt.dataset.lang;
    langLabel.textContent = langNames[currentLang];
    langDropdown.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    langSelector.classList.remove('open');
    document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : currentLang;
    applyLang();
    render();
  });

  function applyLang() {
    const t = i18n[currentLang];
    searchInput.placeholder = t.searchPlaceholder;
    heroEyebrow.textContent = t.heroEyebrow;
    heroTitle.innerHTML = t.heroTitle;
    heroDesc.textContent = t.heroDesc;
    footer.textContent = t.footer;
    emptyEl.textContent = t.empty;

    // form
    const f = t.form;
    document.getElementById('formTitle').textContent = f.title;
    document.getElementById('formDesc').textContent = f.desc;
    document.getElementById('labelSiteName').innerHTML = f.siteName + ' <span class="req">*</span>';
    document.getElementById('labelSiteUrl').innerHTML = f.siteUrl + ' <span class="req">*</span>';
    document.getElementById('labelCategory').innerHTML = f.category + ' <span class="req">*</span>';
    document.getElementById('labelDesc').textContent = f.description;
    document.getElementById('labelContact').innerHTML = f.contact + ' <span class="req">*</span>';
    document.getElementById('inputSiteName').placeholder = f.siteName;
    document.getElementById('inputSiteUrl').placeholder = 'https://';
    document.getElementById('inputDesc').placeholder = f.descPlaceholder;
    document.getElementById('inputContact').placeholder = f.contactPlaceholder;
    document.getElementById('submitBtn').textContent = f.submit;
    document.getElementById('successTitle').textContent = f.successTitle;
    document.getElementById('successDesc').textContent = f.successDesc;

    // rebuild category select
    const sel = document.getElementById('selectCategory');
    sel.innerHTML = `<option value="" disabled selected>${f.categoryPlaceholder}</option>`;
    ['korea', 'luxury', 'street', 'vintage', 'sneaker', 'global'].forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = t.categories[key];
      sel.appendChild(opt);
    });

    // comments
    document.getElementById('commentsTitle').textContent = t.comments.title;
    document.getElementById('commentsDesc').textContent = t.comments.desc;

    // rebuild filter tabs
    filterBar.innerHTML = '';
    catKeys.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (key === currentFilter ? ' active' : '');
      btn.dataset.filter = key;
      btn.textContent = t.categories[key];
      btn.addEventListener('click', () => {
        filterBar.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = key;
        render();
      });
      filterBar.appendChild(btn);
    });
  }

  function render() {
    const t = i18n[currentLang];
    const q = currentSearch.toLowerCase();
    const filtered = sites.filter(s => {
      const matchCat = currentFilter === 'all' || s.cat === currentFilter;
      const desc = s.desc[currentLang] || s.desc.ko;
      const tags = s.tags[currentLang] || s.tags.ko;
      const matchQ = !q
        || s.name.toLowerCase().includes(q)
        || desc.toLowerCase().includes(q)
        || tags.some(tag => tag.toLowerCase().includes(q));
      return matchCat && matchQ;
    });

    grid.innerHTML = '';
    const catLabel = t.categories[currentFilter];
    sectionLabel.textContent = `${catLabel} — ${filtered.length}${t.countSuffix}`;

    if (filtered.length === 0) {
      emptyEl.classList.add('show');
    } else {
      emptyEl.classList.remove('show');
      filtered.forEach((s, i) => {
        const desc = s.desc[currentLang] || s.desc.ko;
        const tags = s.tags[currentLang] || s.tags.ko;
        const a = document.createElement('a');
        a.className = 'card';
        a.href = s.href;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML = `
          <div class="card-head">
            <div class="favicon">${s.emoji}</div>
            <div>
              <div class="card-title">${s.name}</div>
              <div class="card-url">${s.url}</div>
            </div>
          </div>
          <p class="card-desc">${desc}</p>
          <div class="card-footer">
            <div class="tags">${tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
            <span class="arrow">→</span>
          </div>
        `;
        a.style.animationDelay = `${i * 0.04}s`;
        grid.appendChild(a);
      });
    }
  }

  searchInput.addEventListener('input', e => {
    currentSearch = e.target.value;
    render();
  });

  // ── FORM SUBMIT ──
  submitForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.style.opacity = '0.6';
    try {
      const res = await fetch(submitForm.action, {
        method: 'POST',
        body: new FormData(submitForm),
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        submitForm.style.display = 'none';
        formSuccess.classList.add('show');
        submitForm.reset();
      }
    } finally {
      btn.disabled = false;
      btn.style.opacity = '1';
    }
  });

  // init
  applyLang();
  render();

  };

    var d = document, s = d.createElement('script');
    s.src = 'https://digging-1.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
  })();
</script>
