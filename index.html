<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --accent-soft: rgba(200, 169, 110, 0.12);
      --text: #f0f0f0;
      --muted: #888;
      --tag-bg: #252525;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      color: var(--accent);
    }

    .logo span {
      color: var(--text);
      font-size: 0.65rem;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: 0.3em;
      display: block;
      text-transform: uppercase;
      margin-top: -4px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 1rem;
      width: 260px;
      transition: border-color 0.2s;
    }

    .search-box:focus-within { border-color: var(--accent); }

    .search-box svg { color: var(--muted); flex-shrink: 0; }

    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.875rem;
      width: 100%;
    }

    .search-box input::placeholder { color: var(--muted); }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 5rem 2rem 3.5rem;
      border-bottom: 1px solid var(--border);
    }

    .hero-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    .hero p {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── FILTER TABS ── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      padding: 1.8rem 2rem;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }

    .filter-bar::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab:hover { color: var(--text); border-color: #444; }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0d;
    }

    /* ── GRID ── */
    .main { padding: 2.5rem 2rem 5rem; max-width: 1400px; margin: 0 auto; }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.4rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
      margin-bottom: 3.5rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.4rem 1.2rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-soft), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }

    .card:hover::before { opacity: 1; }

    .card-head {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .favicon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .card-title {
      font-size: 0.97rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .card-url {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.65;
      font-weight: 300;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .tag {
      font-size: 0.68rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--muted);
      font-weight: 500;
    }

    .arrow {
      color: var(--accent);
      font-size: 0.85rem;
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.2s;
    }

    .card:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── NO RESULT ── */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      display: none;
    }

    .empty.show { display: block; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    @media (max-width: 640px) {
      .search-box { width: 100%; }
      header { flex-wrap: wrap; height: auto; padding: 1rem; gap: 0.8rem; }
      .hero { padding: 3rem 1.2rem 2.5rem; }
      .main { padding: 2rem 1.2rem 4rem; }
    }
  </style>
</head>

      desc: "영국 뉴캐슬 발 럭셔리·스트릿 셀렉트샵. 드롭 이벤트 활발.",
      tags: ["셀렉트", "드롭", "UK"],
      cat: "global"
    },
  ];

  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');
  const searchInput = document.getElementById('searchInput');
  const tabs = document.querySelectorAll('.tab');
  const sectionLabel = document.getElementById('sectionLabel');

  let currentFilter = 'all';
  let currentSearch = '';

  const categoryNames = {
    all: '전체 사이트',
    korea: '국내 셀렉트샵',
    luxury: '럭셔리 / 하이엔드',
    street: '스트릿 / 슈프리마시',
    vintage: '빈티지 / 중고',
    sneaker: '스니커즈',
    global: '글로벌 멀티'
  };

  function render() {
    const q = currentSearch.toLowerCase();
    const filtered = sites.filter(s => {
      const matchCat = currentFilter === 'all' || s.cat === currentFilter;
      const matchQ = !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.tags.some(t => t.includes(q));
      return matchCat && matchQ;
    });

    grid.innerHTML = '';
    countEl.textContent = filtered.length;
    sectionLabel.innerHTML = `${categoryNames[currentFilter]} — <span id="count">${filtered.length}</span>개`;

    if (filtered.length === 0) {
      emptyEl.classList.add('show');
    } else {
      emptyEl.classList.remove('show');
      filtered.forEach(s => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = s.href;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML = `
          <div class="card-head">
            <div class="favicon">${s.emoji}</div>
            <div>
              <div class="card-title">${s.name}</div>
              <div class="card-url">${s.url}</div>
            </div>
          </div>
          <p class="card-desc">${s.desc}</p>
          <div class="card-footer">
            <div class="tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <span class="arrow">→</span>
          </div>
        `;
        grid.appendChild(a);
      });
    }
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      render();
    });
  });

  searchInput.addEventListener('input', e => {
    currentSearch = e.target.value;
    render();
  });

  render();
</script>
</body>
</html>
