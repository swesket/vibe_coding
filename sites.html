  <div class="grid">
    <a class="card" href="https://www.musinsa.com" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">🟦</div><div><div class="card-title">무신사 / Musinsa</div><div class="card-url">musinsa.com</div></div></div><p class="card-desc">국내 최대 패션 플랫폼으로, 스트릿·캐주얼 브랜드를 중심으로 6,000개 이상의 브랜드를 입점시키고 있습니다. 자체 PB 브랜드 '무신사 스탠다드'는 합리적 가격에 베이직 아이템을 제공하며, 1월·7월 대규모 세일에서는 최대 80% 할인이 적용됩니다.</p><div class="card-footer"><div class="tags"><span class="tag">캐주얼</span><span class="tag">스트릿</span><span class="tag">자체PB</span></div><span class="arrow">→</span></div></a>

    <a class="card" href="https://www.wconcept.co.kr" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">🤍</div><div><div class="card-title">W Concept</div><div class="card-url">wconcept.co.kr</div></div></div><p class="card-desc">국내외 컨템포러리 디자이너 브랜드를 전문으로 다루는 온라인 셀렉트샵입니다. 여성 의류 라인이 강세로, 독창적이고 세련된 디자인을 합리적 가격에 만날 수 있습니다.</p><div class="card-footer"><div class="tags"><span class="tag">컨템포러리</span><span class="tag">디자이너</span></div><span class="arrow">→</span></div></a>
    <a class="card" href="https://www.eql.kr" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">🔲</div><div><div class="card-title">한섬 EQL</div><div class="card-url">eql.kr</div></div></div><p class="card-desc">한섬 그룹이 운영하는 공식 온라인 플랫폼으로, 타임(TIME), 시스템(SYSTEM), 마인(MINE) 등 국내 대표 프리미엄 브랜드를 한곳에서 만날 수 있습니다.</p><div class="card-footer"><div class="tags"><span class="tag">프리미엄</span><span class="tag">한국브랜드</span></div><span class="arrow">→</span></div></a>
    <a class="card" href="https://www.lookpin.com" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">📌</div><div><div class="card-title">룩핀 / Lookpin</div><div class="card-url">lookpin.com</div></div></div><p class="card-desc">실제 착용 사진 기반의 스타일 커머스 플랫폼입니다. 다른 사용자들의 코디를 참고하면서 마음에 드는 아이템을 바로 구매할 수 있습니다.</p><div class="card-footer"><div class="tags"><span class="tag">코디</span><span class="tag">캐주얼</span></div><span class="arrow">→</span></div></a>
    <a class="card" href="https://www.a-bly.com" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">🩷</div><div><div class="card-title">에이블리 / Ably</div><div class="card-url">a-bly.com</div></div></div><p class="card-desc">여성 트렌디 패션에 특화된 국내 대표 쇼핑 앱으로, 동대문 기반 인디 브랜드부터 소호몰까지 폭넓게 입점되어 있습니다.</p><div class="card-footer"><div class="tags"><span class="tag">여성</span><span class="tag">트렌디</span><span class="tag">저가</span></div><span class="arrow">→</span></div></a>
    <a class="card" href="https://www.ssense.com" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">⚫</div><div><div class="card-title">SSENSE</div><div class="card-url">ssense.com</div></div></div><p class="card-desc">캐나다 몬트리올 기반의 글로벌 럭셔리·컨템포러리 셀렉트샵으로, 쇼핑과 에디토리얼 콘텐츠를 독보적으로 결합한 플랫폼입니다. 시즌 오프 세일 시 최대 70% 할인이 적용됩니다.</p><div class="card-footer"><div class="tags"><span class="tag">럭셔리</span><span class="tag">컨템포러리</span><span class="tag">에디토리얼</span></div><span class="arrow">→</span></div></a>
    <a class="card" href="https://www.mytheresa.com" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">🌹</div><div><div class="card-title">Mytheresa</div><div class="card-url">mytheresa.com</div></div></div><p class="card-desc">독일 뮌헨에서 1987년 시작된 유서 깊은 럭셔리 플랫폼으로, 구찌, 프라다, 보테가 베네타, 발렌티노 등 최고급 패션 하우스 위주로 큐레이션합니다.</p><div class="card-footer"><div class="tags"><span class="tag">럭셔리</span><span class="tag">하우스</span></div><span class="arrow">→</span></div></a>
    <a class="card" href="https://www.net-a-porter.com" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">🖤</div><div><div class="card-title">Net-a-Porter</div><div class="card-url">net-a-porter.com</div></div></div><p class="card-desc">럭셔리 여성 패션 온라인 커머스의 선구자로, 2000년 런칭 이후 업계 기준을 세운 플랫폼입니다. 800개 이상의 디자이너 브랜드를 보유합니다.</p><div class="card-footer"><div class="tags"><span class="tag">럭셔리</span><span class="tag">여성</span><span class="tag">매거진</span></div><span class="arrow">→</span></div></a>
    <a class="card" href="https://www.farfetch.com" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">🏷️</div><div><div class="card-title">Farfetch</div><div class="card-url">farfetch.com</div></div></div><p class="card-desc">전 세계 50개국 이상의 부티크와 브랜드를 하나의 플랫폼에서 연결하는 글로벌 럭셔리 마켓플레이스입니다.</p><div class="card-footer"><div class="tags"><span class="tag">럭셔리</span><span class="tag">글로벌부티크</span></div><span class="arrow">→</span></div></a>
    <a class="card" href="https://www.doverstreetmarket.com" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">🏢</div><div><div class="card-title">Dover Street Market</div><div class="card-url">doverstreetmarket.com</div></div></div><p class="card-desc">꼼데가르송의 레이 가와쿠보가 2004년에 런던에서 창립한 아방가르드·럭셔리 콘셉트 스토어입니다.</p><div class="card-footer"><div class="tags"><span class="tag">럭셔리</span><span class="tag">아방가르드</span></div><span class="arrow">→</span></div></a>
    <a class="card" href="https://www.supremenewyork.com" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">🔴</div><div><div class="card-title">Supreme</div><div class="card-url">supremenewyork.com</div></div></div><p class="card-desc">1994년 뉴욕에서 탄생한 스트릿웨어의 아이콘으로, 매주 목요일 한정 수량을 '드롭' 방식으로 발매합니다.</p><div class="card-footer"><div class="tags"><span class="tag">스트릿</span><span class="tag">드롭</span><span class="tag">한정판</span></div><span class="arrow">→</span></div></a>
    <a class="card" href="https://kith.com" target="_blank" rel="noopener noreferrer"><div class="card-head"><div class="favicon">🏀</div><div><div class="card-title">Kith</div><div class="card-url">kith.com</div></div></div><p class="card-desc">뉴욕 기반의 하이엔드 스트릿 브랜드·셀렉트샵으로, 론니 파이그(Ronnie Fieg)가 2011년에 설립했습니다.</p><div class="card-footer"><div class="tags"><span class="tag">스트릿</span><span class="tag">콜라보</span><span class="tag">스니커즈</span></div><span class="arrow">→</span></div></a>

<script>
  const grid = document.getElementById('grid');
  const emptyEl = document.getElementById('empty');
  const searchInput = document.getElementById('searchInput');
  const sectionLabel = document.getElementById('sectionLabel');
  const filterBar = document.getElementById('filterBar');

  let currentFilter = 'all', currentSearch = '';
  const catKeys = ['all','korea','luxury','street','vintage','sneaker','global'];

  // Check URL param for initial category
  const urlParams = new URLSearchParams(window.location.search);
  const catParam = urlParams.get('cat');
  if (catParam && catKeys.includes(catParam)) currentFilter = catParam;

  function renderTabs() {
    const t = i18n[currentLang];
    const frag = document.createDocumentFragment();
    catKeys.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (key === currentFilter ? ' active' : '');
      btn.dataset.filter = key; btn.textContent = t.categories[key];
      frag.appendChild(btn);
    });
    filterBar.innerHTML = '';
    filterBar.appendChild(frag);
  }

  // event delegation for filter tabs
  filterBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    filterBar.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });

  function render() {
    const t = i18n[currentLang]; const q = currentSearch.toLowerCase();
    const frag = document.createDocumentFragment();
    let count = 0;

    sites.forEach(s => {
      if (currentFilter !== 'all' && s.cat !== currentFilter) return;
      const desc = s.desc[currentLang] || s.desc.ko;
      const tags = s.tags[currentLang] || s.tags.ko;
      if (q && !s.name.toLowerCase().includes(q) && !desc.toLowerCase().includes(q) && !tags.some(tag => tag.toLowerCase().includes(q))) return;

      const a = document.createElement('a');
      a.className = 'card'; a.href = s.href; a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.innerHTML = `<div class="card-head"><div class="favicon">${s.emoji}</div><div><div class="card-title">${s.name}</div><div class="card-url">${s.url}</div></div></div><p class="card-desc">${desc}</p><div class="card-footer"><div class="tags">${tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div><span class="arrow">→</span></div>`;
      a.style.animationDelay = `${count * 0.04}s`;
      frag.appendChild(a);
      count++;
    });

    grid.innerHTML = '';
    sectionLabel.textContent = `${t.categories[currentFilter]} — ${count}${t.countSuffix}`;
    emptyEl.textContent = t.empty;
    if (count === 0) { emptyEl.classList.add('show'); } else {
      emptyEl.classList.remove('show');
      grid.appendChild(frag);
    }
  }

  let searchTimer;
  searchInput.addEventListener('input', e => {
    currentSearch = e.target.value;
    clearTimeout(searchTimer);
    searchTimer = setTimeout(render, 200);
  });

  document.addEventListener('langchange', () => {
    renderTabs();
    render();
  });
</script>
