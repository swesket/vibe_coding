        "name": "How to shop at Korean select shops like Musinsa and 29CM?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Korean platforms like Musinsa and 29CM run major sales in January and July. App-exclusive coupons often offer better deals than the website. Always grab the first-purchase coupon which typically offers 10-15% off."
        }
      },
      {
        "@type": "Question",
        "name": "What is the best strategy for online luxury shopping?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "When buying from international luxury platforms, factor in customs duties and taxes. SSENSE and Mytheresa offer up to 70% off during end-of-season sales. Farfetch lets you compare inventory across boutiques worldwide."
        }
      },
      {
        "@type": "Question",
        "name": "How do streetwear drops work for brands like Supreme and Palace?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Brands like Supreme and Palace drop new items at set times weekly. Follow leak accounts, decide your size and color beforehand, and check out instantly at drop time. Save your payment and shipping info 10 minutes before the drop."
        }
      },
      {
        "@type": "Question",
        "name": "How to safely buy vintage and secondhand fashion online?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "On Grailed and Vestiaire Collective, always check seller ratings and transaction history. Request additional photos since condition is hard to judge from listings alone. Use platforms with verification services like KREAM for authentication."
        }
      },
      {
        "@type": "Question",
        "name": "When is the best time to buy sneakers on the resale market?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Compare price graphs on StockX and GOAT to find the optimal buying window. Resale prices typically peak right after release and stabilize 2-3 weeks later. Kicks Crew often has international stock below retail."
        }
      },

        "@type": "Question",

        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Zara and H&M have different stock online vs. in-store. Try showrooming — browse online first, then check fit in-store. ASOS offers student discount and free returns. Uniqlo's best deals come during their Anniversary Sale in November."

<script>
  function renderGuide() {
    const t = i18n[currentLang];
    document.getElementById('guideTitle').textContent = t.guide.title;
    document.getElementById('guideDesc').textContent = t.guide.desc;
    const gg = document.getElementById('guideGrid');
    gg.innerHTML = '';
    t.guide.items.forEach(item => {
      const d = document.createElement('div'); d.className = 'guide-card';
      d.innerHTML = `<h3><span class="icon">${item.icon}</span>${item.title}</h3><p>${item.body}</p><div class="tip">${item.tip}</div>`;
      gg.appendChild(d);
    });
  }

  document.addEventListener('langchange', renderGuide);
</script>
