<script>
  function renderBlog() {
    const t = i18n[currentLang];
    const b = t.blog;
    document.getElementById('blogTitle').textContent = b.title;
    document.getElementById('blogDesc').textContent = b.desc;

    // Render card list
    const cardList = document.getElementById('blogCardList');
    const cardFrag = document.createDocumentFragment();
    b.articles.forEach((article, i) => {
      const card = document.createElement('a');
      card.className = 'blog-card';
      card.href = '#' + article.id;
      card.dataset.articleId = article.id;
      card.style.animationDelay = `${i * 0.04}s`;
      card.innerHTML = `<h3>${article.title}</h3><div class="blog-date">${article.date}</div><p>${article.summary}</p><span class="blog-read-more">${b.readMore}</span>`;
      cardFrag.appendChild(card);
    });
    cardList.innerHTML = '';
    cardList.appendChild(cardFrag);

    // Render full articles (hidden by default, shown on click)
    const articlesContainer = document.getElementById('blogArticles');
    const artFrag = document.createDocumentFragment();
    b.articles.forEach(article => {
      const div = document.createElement('div');
      div.className = 'blog-article';
      div.id = 'article-' + article.id;
      div.style.display = 'none';
      div.innerHTML = `<a class="blog-back">${b.backToList}</a><h2>${article.title}</h2><div class="blog-date">${article.date}</div>${article.body}`;
      artFrag.appendChild(div);
    });
    articlesContainer.innerHTML = '';
    articlesContainer.appendChild(artFrag);

    // Check if URL hash points to an article
    const hash = window.location.hash.replace('#', '');
    if (hash && b.articles.find(a => a.id === hash)) {
      showArticle(hash);
    }
  }

  function showArticle(id) {
    document.getElementById('blogCardList').style.display = 'none';
    const articles = document.querySelectorAll('.blog-article');
    articles.forEach(a => a.style.display = 'none');
    const target = document.getElementById('article-' + id);
    if (target) {
      target.style.display = 'block';
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    history.replaceState(null, '', '#' + id);
  }

  function showList() {
    const articles = document.querySelectorAll('.blog-article');
    articles.forEach(a => a.style.display = 'none');
    document.getElementById('blogCardList').style.display = '';
    history.replaceState(null, '', window.location.pathname);
    document.querySelector('.blog-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // event delegation for blog cards and back buttons
  document.querySelector('.blog-section').addEventListener('click', (e) => {
    const card = e.target.closest('.blog-card');
    if (card) {
      e.preventDefault();
      showArticle(card.dataset.articleId);
      return;
    }
    const back = e.target.closest('.blog-back');
    if (back) {
      e.preventDefault();
      showList();
    }
  });

  window.addEventListener('hashchange', () => {
    const hash = window.location.hash.replace('#', '');
    const t = i18n[currentLang];
    if (hash && t.blog.articles.find(a => a.id === hash)) {
      showArticle(hash);
    } else {
      showList();
    }
  });

  document.addEventListener('langchange', renderBlog);
</script>
